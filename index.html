<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloom & Petal - Interactive Bouquet Builder</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts for Serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --soft-pink: #fadadd;
            --deep-pink: #f4a5b0;
            --deep-green: #2d5016;
            --light-green: #527a3a;
            --gold: #d4af37;
            --cream: #fefbf3;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, var(--cream) 0%, var(--soft-pink) 100%);
            min-height: 100vh;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }

        .vase-container {
            position: relative;
            width: 300px;
            height: 400px;
            margin: 0 auto;
        }

        .vase {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 250px;
            background: linear-gradient(to bottom, rgba(45, 80, 22, 0.2) 0%, rgba(45, 80, 22, 0.4) 100%);
            border-radius: 0 0 30% 30%;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            border: 3px solid var(--deep-green);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .flower-in-vase {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bloom 0.5s ease-out;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .flower-in-vase:hover {
            transform: scale(1.1);
        }

        @keyframes bloom {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        .flower-btn {
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .flower-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .gift-card {
            background: linear-gradient(135deg, var(--cream) 0%, white 100%);
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            min-height: 120px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--deep-green);
        }

        .receipt-item {
            border-bottom: 1px dashed var(--light-green);
            padding: 8px 0;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-left: 4px solid var(--gold);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
            max-width: 350px;
        }

        @keyframes slideIn {
            0% {
                transform: translateX(400px);
                opacity: 0;
            }
            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .celebration {
            background: linear-gradient(135deg, var(--gold) 0%, var(--deep-pink) 100%);
            color: white;
            border-left: 4px solid white;
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-12">
            <h1 class="text-6xl font-bold mb-2" style="color: var(--deep-green);">
                Bloom & Petal
            </h1>
            <p class="text-xl" style="color: var(--light-green);">
                <i>Boutique Bouquet Builder</i>
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Left Column: Flower Selection & Vase -->
            <div class="bg-white/80 backdrop-blur rounded-2xl p-8 shadow-2xl">
                <h2 class="text-3xl font-bold mb-6" style="color: var(--deep-green);">
                    Create Your Bouquet
                </h2>

                <!-- Virtual Vase -->
                <div class="vase-container mb-8" id="vaseContainer">
                    <div id="flowersDisplay"></div>
                    <div class="vase"></div>
                </div>

                <!-- Flower Selection -->
                <div class="mb-6">
                    <h3 class="text-2xl font-semibold mb-4" style="color: var(--deep-green);">
                        Standard Collection
                    </h3>
                    <p class="text-sm mb-3" style="color: var(--light-green);">$2.00 each</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="addFlower('Tulip', 2.00, '#FF6B9D')"
                                class="flower-btn bg-gradient-to-br from-pink-300 to-pink-400 text-white py-4 px-6 rounded-xl font-semibold shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="flower-2" class="w-6 h-6"></i>
                            Tulip
                        </button>
                        <button onclick="addFlower('Daisy', 2.00, '#FFE66D')"
                                class="flower-btn bg-gradient-to-br from-yellow-200 to-yellow-300 text-gray-800 py-4 px-6 rounded-xl font-semibold shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="flower" class="w-6 h-6"></i>
                            Daisy
                        </button>
                    </div>
                </div>

                <div>
                    <h3 class="text-2xl font-semibold mb-4" style="color: var(--deep-green);">
                        Premium Collection
                    </h3>
                    <p class="text-sm mb-3" style="color: var(--light-green);">$5.00 each</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="addFlower('Rose', 5.00, '#DC143C')"
                                class="flower-btn bg-gradient-to-br from-red-400 to-red-500 text-white py-4 px-6 rounded-xl font-semibold shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="flower-2" class="w-6 h-6"></i>
                            Rose
                        </button>
                        <button onclick="addFlower('Lily', 5.00, '#E6E6FA')"
                                class="flower-btn bg-gradient-to-br from-purple-200 to-purple-300 text-gray-800 py-4 px-6 rounded-xl font-semibold shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="flower" class="w-6 h-6"></i>
                            Lily
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column: Gift Note & Receipt -->
            <div class="space-y-8">
                <!-- Gift Message -->
                <div class="bg-white/80 backdrop-blur rounded-2xl p-8 shadow-2xl">
                    <h2 class="text-3xl font-bold mb-6" style="color: var(--deep-green);">
                        Add a Personal Touch
                    </h2>

                    <label class="block mb-3 font-semibold" style="color: var(--light-green);">
                        Gift Message
                    </label>
                    <textarea
                        id="giftMessage"
                        oninput="updateGiftCard()"
                        class="w-full p-4 border-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-opacity-50 resize-none"
                        style="border-color: var(--light-green); focus:ring-color: var(--gold);"
                        rows="4"
                        placeholder="Write a heartfelt message..."></textarea>

                    <div class="mt-4">
                        <p class="text-sm mb-2 font-semibold" style="color: var(--light-green);">
                            Preview:
                        </p>
                        <div class="gift-card" id="giftCardPreview">
                            <p class="text-gray-400 italic">Your message will appear here...</p>
                        </div>
                    </div>
                </div>

                <!-- Receipt -->
                <div class="bg-white/80 backdrop-blur rounded-2xl p-8 shadow-2xl">
                    <h2 class="text-3xl font-bold mb-6" style="color: var(--deep-green);">
                        Your Order
                    </h2>

                    <div id="receipt" class="mb-6">
                        <div class="receipt-item flex justify-between">
                            <span style="color: var(--light-green);">Base Arrangement</span>
                            <span style="color: var(--deep-green);" class="font-semibold">$15.00</span>
                        </div>
                    </div>

                    <div id="ribbonMessage" class="hidden mb-4 p-4 rounded-lg" style="background-color: var(--soft-pink); border-left: 4px solid var(--gold);">
                        <p class="font-semibold" style="color: var(--deep-green);">
                            🎀 Complimentary Silk Ribbon Included!
                        </p>
                    </div>

                    <div class="pt-4 border-t-2 flex justify-between items-center" style="border-color: var(--deep-green);">
                        <span class="text-2xl font-bold" style="color: var(--deep-green);">Total:</span>
                        <span id="totalPrice" class="text-3xl font-bold" style="color: var(--gold);">$15.00</span>
                    </div>

                    <button
                        onclick="checkout()"
                        class="w-full mt-6 py-4 px-6 rounded-xl font-bold text-white text-xl shadow-lg transition-all hover:shadow-2xl hover:scale-105"
                        style="background: linear-gradient(135deg, var(--deep-green) 0%, var(--light-green) 100%);">
                        Complete Your Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let flowers = [];
        let basePrice = 15.00;

        // Initialize Lucide icons
        lucide.createIcons();

        // Add flower to bouquet
        function addFlower(name, price, color) {
            const flower = {
                id: Date.now(),
                name: name,
                price: price,
                color: color
            };

            flowers.push(flower);
            updateDisplay();
            updateReceipt();
        }

        // Remove flower from bouquet
        function removeFlower(id) {
            flowers = flowers.filter(f => f.id !== id);
            updateDisplay();
            updateReceipt();
        }

        // Update visual display of flowers in vase
        function updateDisplay() {
            const container = document.getElementById('flowersDisplay');
            container.innerHTML = '';

            flowers.forEach((flower, index) => {
                const flowerElement = document.createElement('div');
                flowerElement.className = 'flower-in-vase';
                flowerElement.style.backgroundColor = flower.color;
                flowerElement.onclick = () => removeFlower(flower.id);
                flowerElement.title = `Click to remove ${flower.name}`;

                // Position flowers in a semi-random but organized way
                const positions = [
                    { left: '25%', top: '10%' },
                    { left: '50%', top: '5%' },
                    { left: '75%', top: '15%' },
                    { left: '30%', top: '30%' },
                    { left: '60%', top: '25%' },
                    { left: '40%', top: '50%' },
                    { left: '70%', top: '45%' },
                    { left: '20%', top: '60%' },
                    { left: '55%', top: '55%' },
                    { left: '35%', top: '70%' }
                ];

                const pos = positions[index % positions.length];
                flowerElement.style.left = pos.left;
                flowerElement.style.top = pos.top;

                // Add flower icon
                const icon = document.createElement('i');
                icon.setAttribute('data-lucide', 'flower-2');
                icon.className = 'w-6 h-6';
                icon.style.color = 'white';
                flowerElement.appendChild(icon);

                container.appendChild(flowerElement);
            });

            // Reinitialize icons for new flowers
            lucide.createIcons();
        }

        // Update receipt
        function updateReceipt() {
            const receipt = document.getElementById('receipt');
            let html = `
                <div class="receipt-item flex justify-between">
                    <span style="color: var(--light-green);">Base Arrangement</span>
                    <span style="color: var(--deep-green);" class="font-semibold">$${basePrice.toFixed(2)}</span>
                </div>
            `;

            // Group flowers by type
            const flowerCounts = {};
            flowers.forEach(flower => {
                if (!flowerCounts[flower.name]) {
                    flowerCounts[flower.name] = { count: 0, price: flower.price };
                }
                flowerCounts[flower.name].count++;
            });

            // Add each flower type to receipt
            for (const [name, data] of Object.entries(flowerCounts)) {
                const total = data.count * data.price;
                html += `
                    <div class="receipt-item flex justify-between">
                        <span style="color: var(--light-green);">${name} × ${data.count}</span>
                        <span style="color: var(--deep-green);" class="font-semibold">$${total.toFixed(2)}</span>
                    </div>
                `;
            }

            const totalPrice = calculateTotal();

            // Add complimentary ribbon if over $40
            if (totalPrice > 40) {
                html += `
                    <div class="receipt-item flex justify-between" style="color: var(--gold);">
                        <span>✨ Complimentary Silk Ribbon</span>
                        <span class="font-semibold">$0.00</span>
                    </div>
                `;
                document.getElementById('ribbonMessage').classList.remove('hidden');
            } else {
                document.getElementById('ribbonMessage').classList.add('hidden');
            }

            receipt.innerHTML = html;
            document.getElementById('totalPrice').textContent = `$${totalPrice.toFixed(2)}`;
        }

        // Calculate total price
        function calculateTotal() {
            let total = basePrice;
            flowers.forEach(flower => {
                total += flower.price;
            });
            return total;
        }

        // Update gift card preview
        function updateGiftCard() {
            const message = document.getElementById('giftMessage').value;
            const preview = document.getElementById('giftCardPreview');

            if (message.trim() === '') {
                preview.innerHTML = '<p class="text-gray-400 italic">Your message will appear here...</p>';
            } else {
                preview.innerHTML = `<p class="text-lg leading-relaxed">"${message}"</p>`;
            }
        }

        // Checkout validation
        function checkout() {
            if (flowers.length === 0) {
                showNotification(
                    'A vase looks best with flowers! Please add at least one bloom to your bouquet.',
                    false
                );
                return;
            }

            const total = calculateTotal();
            if (total > 40) {
                showNotification(
                    '🎉 Congratulations! Your beautiful bouquet qualifies for a complimentary silk ribbon!',
                    true
                );
            } else {
                showNotification(
                    '✨ Thank you for your order! Your beautiful bouquet will be prepared with care.',
                    false
                );
            }
        }

        // Show notification
        function showNotification(message, isCelebration) {
            // Remove existing notification if any
            const existing = document.querySelector('.notification');
            if (existing) {
                existing.remove();
            }

            const notification = document.createElement('div');
            notification.className = 'notification' + (isCelebration ? ' celebration' : '');
            notification.innerHTML = `
                <p class="font-semibold text-lg mb-2">${isCelebration ? 'Wonderful!' : 'Notice'}</p>
                <p>${message}</p>
            `;

            document.body.appendChild(notification);

            // Auto-remove after 5 seconds
            setTimeout(() => {
                notification.style.animation = 'slideIn 0.3s ease-out reverse';
                setTimeout(() => notification.remove(), 300);
            }, 5000);
        }

        // Initialize
        updateReceipt();
    </script>
</body>
</html>
